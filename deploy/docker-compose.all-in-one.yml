# AI调度中心 - 单机全栈部署配置
# 前端 + 后端 + MySQL + Redis 全部部署在一台服务器

version: '3.8'

services:
  # 后端应用
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: aikey-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://host.docker.internal:3306/ai_key_management?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-root}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-host.docker.internal}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms512m -Xmx1024m -XX:+UseG1GC"
      LOGGING_LEVEL_ROOT: WARN
      LOGGING_LEVEL_COM_AIKEY: INFO
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - aikey-network

  # 前端 + Nginx
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: aikey-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8083:80"
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    networks:
      - aikey-network

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  aikey-network:
    driver: bridge
