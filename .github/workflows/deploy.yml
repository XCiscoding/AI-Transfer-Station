name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RELEASE_DIR: /root/AI-center/releases
      APP_DIR: /root/AI-center/AI-Transfer-Station
      RELEASE_NAME: release-${{ github.sha }}
      RELEASE_UPLOAD_DIR: .release-upload
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create release archive
        env:
          ARCHIVE_PATH: ${{ runner.temp }}/${{ env.RELEASE_NAME }}.tar.gz
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='.trae' \
            --exclude='.venv' \
            --exclude='node_modules' \
            --exclude='frontend/node_modules' \
            --exclude='backend/target' \
            --exclude='.idea' \
            --exclude='.vscode' \
            --exclude='*.log' \
            -czf "$ARCHIVE_PATH" .

      - name: Stage release archive for upload
        env:
          ARCHIVE_PATH: ${{ runner.temp }}/${{ env.RELEASE_NAME }}.tar.gz
        run: |
          rm -rf "${{ env.RELEASE_UPLOAD_DIR }}"
          mkdir -p "${{ env.RELEASE_UPLOAD_DIR }}"
          cp "$ARCHIVE_PATH" "${{ env.RELEASE_UPLOAD_DIR }}/${{ env.RELEASE_NAME }}.tar.gz"
          ls -l "${{ env.RELEASE_UPLOAD_DIR }}"

      - name: Upload release archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          port: 22
          key: ${{ secrets.DEPLOY_KEY }}
          source: "${{ env.RELEASE_UPLOAD_DIR }}/${{ env.RELEASE_NAME }}.tar.gz"
          target: ${{ env.RELEASE_DIR }}/

      - name: Deploy release on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          port: 22
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            mkdir -p "${{ env.RELEASE_DIR }}" "${{ env.APP_DIR }}"
            cd "${{ env.RELEASE_DIR }}"

            echo "=== Deploy context ==="
            echo "RELEASE_DIR=${{ env.RELEASE_DIR }}"
            echo "APP_DIR=${{ env.APP_DIR }}"
            echo "RELEASE_NAME=${{ env.RELEASE_NAME }}"
            pwd

            echo "=== release dir snapshot before extract ==="
            ls -la

            echo "=== candidate archives under release dir ==="
            find "${{ env.RELEASE_DIR }}" -maxdepth 5 -type f -name 'release-*.tar.gz' -printf '%TY-%Tm-%Td %TH:%TM:%TS %p %k KB\n' | sort || true

            rm -rf "${{ env.RELEASE_NAME }}"
            mkdir -p "${{ env.RELEASE_NAME }}"

            if [ -f "${{ env.RELEASE_NAME }}.tar.gz" ]; then
              ARCHIVE_PATH="${{ env.RELEASE_DIR }}/${{ env.RELEASE_NAME }}.tar.gz"
              echo "Using direct archive match"
            else
              ARCHIVE_PATH=$(find "${{ env.RELEASE_DIR }}" -maxdepth 5 -type f -name "${{ env.RELEASE_NAME }}.tar.gz" | head -n 1 | tr -d '\r' || true)

              if [ -z "$ARCHIVE_PATH" ]; then
                echo "Release archive not found under ${{ env.RELEASE_DIR }}"
                echo "=== all files under release dir ==="
                find "${{ env.RELEASE_DIR }}" -maxdepth 5 -type f | sort || true
                exit 1
              fi

              echo "Using nested archive match"
            fi

            printf 'Using release archive: [%s]\n' "$ARCHIVE_PATH"
            ls -l "$ARCHIVE_PATH"
            echo "=== archive file metadata ==="
            stat "$ARCHIVE_PATH"
            echo "=== archive top-level entries ==="
            tar -tzf "$ARCHIVE_PATH" | head -n 40
            tar -xzf "$ARCHIVE_PATH" -C "${{ env.RELEASE_NAME }}"

            echo "=== extracted release snapshot ==="
            find "${{ env.RELEASE_NAME }}" -maxdepth 2 -mindepth 1 | sort | head -n 80

            if [ -f "${{ env.APP_DIR }}/deploy/.env" ]; then
              cp "${{ env.APP_DIR }}/deploy/.env" "${{ env.RELEASE_NAME }}/deploy/.env"
            elif [ -f "${{ env.RELEASE_NAME }}/deploy/.env.example" ]; then
              cp "${{ env.RELEASE_NAME }}/deploy/.env.example" "${{ env.RELEASE_NAME }}/deploy/.env"
            fi

            if [ -d "${{ env.APP_DIR }}/deploy" ]; then
              cd "${{ env.APP_DIR }}"
              docker compose -f deploy/docker-compose.all-in-one.yml down || true
            fi

            docker rm -f aikey-backend aikey-frontend 2>/dev/null || true
            docker network rm deploy_aikey-network 2>/dev/null || true

            cd "${{ env.RELEASE_DIR }}"
            rm -rf "${{ env.APP_DIR }}"
            mv "${{ env.RELEASE_NAME }}" "${{ env.APP_DIR }}"
            cd "${{ env.APP_DIR }}"

            docker compose -f deploy/docker-compose.all-in-one.yml up -d --build
            docker compose -f deploy/docker-compose.all-in-one.yml ps

            echo "=== port listeners after compose up ==="
            ss -ltnp | grep -E ':8080|:8083' || true

            echo "=== frontend http headers ==="
            curl -I --max-time 15 http://127.0.0.1:8083

            echo "=== backend health via frontend route ==="
            if ! curl --fail --show-error --max-time 20 http://127.0.0.1:8083/api/health; then
              echo "=== docker ps ==="
              docker ps --format 'table {{.Names}}\t{{.Ports}}\t{{.Status}}'
              echo "=== compose logs: backend ==="
              docker compose -f deploy/docker-compose.all-in-one.yml logs --tail=200 backend || true
              echo "=== compose logs: frontend ==="
              docker compose -f deploy/docker-compose.all-in-one.yml logs --tail=200 frontend || true
              exit 1
            fi
