# AI调度中心 - Docker Compose配置
# 一键启动：MySQL + Redis + 后端应用

version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: docker.1ms.run/mysql:8.0
    container_name: aikey-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ai_key_management
      MYSQL_USER: aikey
      MYSQL_PASSWORD: aikey123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/src/main/resources/db/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --character-set-client-handshake=FALSE
      --init-connect='SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci'
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aikey-network

  # Redis缓存
  redis:
    image: docker.1ms.run/redis:7-alpine
    container_name: aikey-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - aikey-network

  # 后端应用
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aikey-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # 数据库配置
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ai_key_management?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      # Redis配置
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # 日志级别
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_COM_AIKEY: DEBUG
    networks:
      - aikey-network

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  aikey-network:
    driver: bridge
